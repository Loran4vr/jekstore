# GitHub Actions Workflow - Free Cloud Training!
# This runs on GitHub's servers - NO signup needed!

name: Train AI Model

on:
  # Run manually
  workflow_dispatch:
  # Or run on schedule
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install torch numpy transformers
      
      - name: Run training
        run: |
          python3 cloud_lm.py
      
      - name: Commit trained model
        if: always()
        run: |
          git config --global user.email "ai@github.com"
          git config --global user.name "AI Trainer"
          git add -A
          git commit -m "Training checkpoint $(date)" || echo "No changes"
          git push || echo "Push failed"